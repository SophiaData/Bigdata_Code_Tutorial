# GitHub Actions CI for Bigdata_Code_Tutorial
# Supersedes the legacy "Build and CodeQL.yaml" (which was pinned to Java 8).
#
# Five parallel jobs:
#   1. lint-and-unit          → spotless + unit tests (fast feedback, ~2 min)
#   2. integration-tests      → full IT with testcontainers-managed MySQL (~5 min)
#   3. package-sync-database  → build the runnable Flink CDC jar
#   4. codeql                 → security analysis (preserved from legacy)
#   5. intellij-style-lint    → Error Prone + SpotBugs (IDEA-style static findings,
#                                report-only — uploads XML/HTML artifacts for triage)
#
# Triggers: push to master + every PR targeting master.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Allow integration tests to write a job summary, allow CodeQL to upload SARIF.
permissions:
  contents: read
  pull-requests: read

env:
  MAVEN_OPTS: -Xmx2g -Xms512m
  # Always run JDK 11 — matches the project's <java.version>11</java.version> in the parent POM.

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: lint + unit tests (fast feedback on every PR)
  # ---------------------------------------------------------------------------
  lint-and-unit:
    name: Lint & Unit Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module: [flink-demo, sync_database_mysql, flink-function, flink-paimon-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin

      - name: Cache local Maven repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          # Invalidate when any pom.xml changes; fall back to partial cache on miss.
          key: m2-${{ runner.os }}-jdk11-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-jdk11-

      - name: Install local modules
        run: ./mvnw install -DskipTests -Dspotless.check.skip=true -Dcheckstyle.skip=true

      - name: Verify spotless format
        run: ./mvnw -pl ${{ matrix.module }} -am spotless:check

      - name: Run checkstyle analysis
        run: ./mvnw -pl ${{ matrix.module }} -am checkstyle:check
        continue-on-error: false

      - name: Run PMD complexity analysis
        run: ./mvnw -pl ${{ matrix.module }} -am pmd:check

      - name: Run unit tests (skip *IT and FlinkSqlWDSTest)
        # Surefire defaults do NOT pick up *IT.java — those run in job 2.
        run: |
          set +H
          ./mvnw -pl ${{ matrix.module }} -am test \
            -Dtest='!*IT,!*IntegrationTest,!*FlinkSqlWDSTest'

      - name: Collect JaCoCo coverage
        run: ./mvnw -pl ${{ matrix.module }} -am verify -Djacoco.skip=false -DskipTests

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: integration tests with Testcontainers-managed MySQL
  #         (no external MySQL service needed; only Docker on the runner)
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (sync_database_mysql)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin

      - name: Cache local Maven repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-jdk11-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-jdk11-

      - name: Run sync_database_mysql unit tests + CreateMysqlLSinkTableIT
        env:
          MYSQL_IT_SOURCE_URL: ${{ secrets.MYSQL_IT_SOURCE_URL }}
          MYSQL_IT_SOURCE_USER: ${{ secrets.MYSQL_IT_SOURCE_USER }}
          MYSQL_IT_SOURCE_PASSWORD: ${{ secrets.MYSQL_IT_SOURCE_PASSWORD }}
        run: |
          set +H
          EXTRA_ARGS=""
          if [ -n "$MYSQL_IT_SOURCE_URL" ]; then
            EXTRA_ARGS="-Dmysql.test.url=$MYSQL_IT_SOURCE_URL \
              -Dmysql.test.user=${MYSQL_IT_SOURCE_USER:-root} \
              -Dmysql.test.password=${MYSQL_IT_SOURCE_PASSWORD:-root}"
          fi
          ./mvnw -pl sync_database_mysql -am test \
            -Dtest='MysqlUtilTest,NacosUtilTest,PropertiesUtilTest,ParameterUtilTest,CreateMysqlLSinkTableIT' \
            -DrunIntegrationTests=true \
            $EXTRA_ARGS

      - name: Run FlinkSqlWDSTest end-to-end (only when secrets are configured)
        env:
          MYSQL_IT_SOURCE_URL: ${{ secrets.MYSQL_IT_SOURCE_URL }}
          MYSQL_IT_SINK_URL: ${{ secrets.MYSQL_IT_SINK_URL }}
          MYSQL_IT_SOURCE_USER: ${{ secrets.MYSQL_IT_SOURCE_USER }}
          MYSQL_IT_SINK_USER: ${{ secrets.MYSQL_IT_SINK_USER }}
          MYSQL_IT_SOURCE_PASSWORD: ${{ secrets.MYSQL_IT_SOURCE_PASSWORD }}
          MYSQL_IT_SINK_PASSWORD: ${{ secrets.MYSQL_IT_SINK_PASSWORD }}
        if: env.MYSQL_IT_SOURCE_URL != '' && env.MYSQL_IT_SINK_URL != ''
        run: ./mvnw -pl sync_database_mysql test \
          -Dtest=FlinkSqlWDSTest \
          -DrunIntegrationTests=true \
          -Dmysql.it.source.url="$MYSQL_IT_SOURCE_URL" \
          -Dmysql.it.source.user="${MYSQL_IT_SOURCE_USER:-root}" \
          -Dmysql.it.source.password="${MYSQL_IT_SOURCE_PASSWORD:-root}" \
          -Dmysql.it.sink.url="$MYSQL_IT_SINK_URL" \
          -Dmysql.it.sink.user="${MYSQL_IT_SINK_USER:-root}" \
          -Dmysql.it.sink.password="${MYSQL_IT_SINK_PASSWORD:-root}"

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-integration
          path: sync_database_mysql/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2b: e2e tests (Testcontainers MySQL + MongoDB, requires Docker)
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin

      - name: Cache local Maven repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-jdk11-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-jdk11-

      - name: Build all modules (skip tests)
        run: |
          set +H
          ./mvnw install -DskipTests -Dspotless.check.skip=true -Dcheckstyle.skip=true

      - name: Run e2e tests
        run: |
          set +H
          ./mvnw test -pl e2e-tests

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-e2e
          path: e2e-tests/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2c: IDEA-style static analysis (Error Prone + SpotBugs)
  #         Report-only: findings are uploaded as artifacts, the job does not fail
  #         the build. Once the baseline is at zero, switch failOnViolation -> true.
  # ---------------------------------------------------------------------------
  intellij-style-lint:
    name: IDEA-style Lint (Error Prone + SpotBugs)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin

      - name: Cache local Maven repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-jdk11-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-jdk11-

      - name: Compile under Error Prone (findings printed, build stays green)
        run: ./mvnw -B -ntp -pl flink-demo,sync_database_mysql,flink-function,flink-paimon-demo -am clean compile -DskipTests

      - name: Run SpotBugs (report-only, mirrors IDEA's bug-level inspections)
        run: ./mvnw -B -ntp -pl flink-demo,sync_database_mysql,flink-function,flink-paimon-demo -am verify -DskipTests -Dspotless.check.skip=true -Dcheckstyle.skip=true

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-reports
          path: |
            **/target/spotbugs/*.xml
            **/target/spotbugs/*.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Summarise finding counts in job summary
        if: always()
        run: |
          set +e
          shopt -s globstar nullglob
          echo "## IDEA-style lint summary" >> "$GITHUB_STEP_SUMMARY"
          total=0
          for f in **/target/spotbugs/spotbugsXml.xml; do
            [ -f "$f" ] || continue
            mod=$(echo "$f" | cut -d/ -f1)
            count=$(grep -c '<BugInstance ' "$f" || true)
            echo "- \`${mod}\`: ${count} SpotBugs findings" >> "$GITHUB_STEP_SUMMARY"
            total=$((total + count))
          done
          echo "**Total: ${total} findings across SpotBugs**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Error Prone findings are printed inline in the \`Compile under Error Prone\` step." >> "$GITHUB_STEP_SUMMARY"
          cat "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 3: package the runnable WDS jar (depends on lint-and-unit passing)
  # ---------------------------------------------------------------------------
  package-sync-database:
    name: Package sync_database_mysql (shaded jar)
    runs-on: ubuntu-latest
    needs: lint-and-unit
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin

      - name: Cache local Maven repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-jdk11-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-jdk11-

      - name: Build runnable jar
        run: ./mvnw -pl sync_database_mysql -am clean package -DskipTests

      - name: Upload shaded jar artifact
        uses: actions/upload-artifact@v7
        with:
          name: sync-database-mysql-jar
          path: sync_database_mysql/target/sync_database_mysql-*.jar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 4: CodeQL security analysis (preserved from legacy workflow)
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          build-mode: manual

      - name: Build project for CodeQL
        run: ./mvnw -DskipTests -Dmaven.javadoc.skip=true package

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:java