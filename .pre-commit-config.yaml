# See https://pre-commit.com/hooks.html for more hooks

default_stages: [commit, push]
repos:
  - repo: local
    hooks:
      # Spotless: google-java-format AOSP + License header
      - id: spotless
        name: spotless lint
        entry: ./mvnw spotless:apply
        language: script
        pass_filenames: false
