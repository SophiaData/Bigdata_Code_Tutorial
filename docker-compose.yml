version: '3.8'

services:
  # MySQL Source Database
  mysql-source:
    image: mysql:8.4.0
    container_name: cdc-test-source
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flink_source
      MYSQL_USER: cdc_user
      MYSQL_PASSWORD: cdc_password
      MYSQL_INITDB_SKIP_TZINFO: 1
    ports:
      - "33061:3306"
    volumes:
      - mysql-source-data:/var/lib/mysql
      - ./docker-init:/docker-entrypoint-initdb.d
    command:
      - "--server-id=1"
      - "--log_bin=mysql-bin"
      - "--binlog_format=ROW"
      - "--gtid_mode=ON"
      - "--enforce_gtid_consistency=ON"
      - "--binlog_row_image=FULL"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # MySQL Sink Database
  mysql-sink:
    image: mysql:8.4.0
    container_name: cdc-test-sink
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flink_sink
      MYSQL_INITDB_SKIP_TZINFO: 1
    ports:
      - "33062:3306"
    volumes:
      - mysql-sink-data:/var/lib/mysql
      - ./docker-init:/docker-entrypoint-initdb.d
    command:
      - "--server-id=2"
      - "--log_bin=mysql-bin"
      - "--binlog_format=ROW"
      - "--gtid_mode=ON"
      - "--enforce_gtid_consistency=ON"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Flink JobManager
  flink-jobmanager:
    image: flink:1.20.1-scala_2.12-java11
    container_name: flink-jobmanager
    ports:
      - "18081:8081"  # Web UI
      - "6123:6123"   # RPC
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink/checkpoints
        execution.checkpointing.interval: 1min
    volumes:
      - flink-jobmanager-checkpoints:/tmp/flink/checkpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/cluster || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Flink TaskManager
  flink-taskmanager:
    image: flink:1.20.1-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    scale: 1
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink/checkpoints
        execution.checkpointing.interval: 1min
    volumes:
      - flink-jobmanager-checkpoints:/tmp/flink/checkpoints

  # Test Data Loader (Optional)
  test-data-loader:
    image: mysql:8.4.0
    container_name: test-data-loader
    depends_on:
      mysql-source:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-source
      MYSQL_PORT: 3306
      MYSQL_USER: cdc_user
      MYSQL_PASSWORD: cdc_password
      MYSQL_DATABASE: flink_source
    volumes:
      - ./test-data:/test-data
    command: >
      sh -c "
        echo 'Waiting for MySQL source to be ready...'
        while ! mysqladmin ping -h mysql-source -u cdc_user -pcdc_password --silent; do
          sleep 2
        done
        
        echo 'Loading test data...'
        mysql -h mysql-source -u cdc_user -pcdc_password flink_source < /test-data/init-data.sql
        
        echo 'Test data loaded successfully!'
        echo 'Tables in flink_source database:'
        mysql -h mysql-source -u cdc_user -pcdc_password flink_source -e 'SHOW TABLES;'
      "

volumes:
  mysql-source-data:
  mysql-sink-data:
  flink-jobmanager-checkpoints: